name: Bug 反馈
description: 提交缺陷、回归问题或异常流程
title: "[Bug] "
labels:
  - "status: needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题。

        你可以使用中文或英文填写此表单。
  - type: textarea
    id: summary
    attributes:
      label: 问题概述
      description: 当前出现了什么问题？
      placeholder: 请简要描述这个 bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请尽量列出可稳定复现问题的步骤
      placeholder: |
        1. 进入 ...
        2. 点击 ...
        3. 出现 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      placeholder: 你原本预期会发生什么？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      placeholder: 实际发生了什么？
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - 前端
        - 后端
        - 实战模式
        - 训练模式
        - LLM 设置 / 集成
        - 构建 / CI
        - 文档
        - 其他
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 错误日志、截图或请求细节
      description: 如果有堆栈、浏览器报错、截图或接口细节，请贴在这里
      render: text
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 请补充操作系统、Node 版本、浏览器等信息
      placeholder: |
        - 操作系统：
        - Node 版本：
        - 浏览器：
        - 仓库版本 / 提交：
  - type: checkboxes
    id: checks
    attributes:
      label: 确认项
      options:
        - label: 我已阅读 README，并检查过现有 issue 后再提交此问题
          required: true
