name: Bug report
description: Report a defect, regression, or broken workflow
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem.

        You can write this form in Chinese or English.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps so we can reproduce the issue
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Frontend
        - Backend
        - Battle mode
        - Training mode
        - LLM settings / integration
        - Build / CI
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error logs, screenshots, or request details
      description: Paste stack traces, browser errors, screenshots, or API details if available
      render: text
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node version, browser, and anything else relevant
      placeholder: |
        - OS:
        - Node:
        - Browser:
        - Repo version / commit:
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I checked the README / existing issues before opening this report
          required: true
