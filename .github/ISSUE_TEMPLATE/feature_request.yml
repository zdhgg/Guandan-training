name: 功能建议
description: 提出新功能或有价值的改进建议
title: "[Feature] "
labels:
  - "status: needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        感谢提出改进建议。

        你可以使用中文或英文填写此表单。
  - type: textarea
    id: problem
    attributes:
      label: 背景问题或改进机会
      description: 你希望解决什么问题？
      placeholder: 当前流程存在的问题是 ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述你希望加入或调整的内容
      placeholder: 建议增加 / 调整 ...
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: 价值说明
      description: 说明这个改动对用户或维护者的价值
      placeholder: 这个改动有帮助，因为 ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 相关模块
      options:
        - 前端
        - 后端
        - 实战模式
        - 训练模式
        - LLM 设置 / 集成
        - 构建 / CI
        - 文档
        - 其他
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 可选，但如果你评估过其他做法，会很有帮助
      placeholder: 也考虑过 ...
  - type: textarea
    id: extra
    attributes:
      label: 参考资料、示意图或示例
      description: 欢迎补充截图、链接、接口示例等材料
  - type: checkboxes
    id: checks
    attributes:
      label: 确认项
      options:
        - label: 我已阅读 README，并检查过现有 issue 后再提交此建议
          required: true
